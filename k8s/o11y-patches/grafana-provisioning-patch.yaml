# Replaces the upstream `grafana-dashboards-provisioning` ConfigMap to
# add the rcs-etcd provider as a sixth entry. The existing five
# providers are preserved verbatim from stepflow-o11y/grafana/
# configmap-dashboards-provisioning.yaml; only the trailing rcs-etcd
# block is new. Re-run `apply.sh` after upstream stepflow adds a new
# provider and the contents need to be re-synced.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: stepflow-o11y
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: 'Stepflow Dashboards'
        orgId: 1
        folder: 'Stepflow'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/stepflow

      - name: 'Infrastructure'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/infrastructure

      - name: 'Docling'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/docling

      - name: 'Docling Worker'
        orgId: 1
        folder: 'Stepflow'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/docling-worker

      - name: 'Docling gRPC'
        orgId: 1
        folder: 'Stepflow'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/docling-grpc

      - name: 'rcs-etcd'
        orgId: 1
        folder: 'rcs-etcd'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/rcs-etcd
