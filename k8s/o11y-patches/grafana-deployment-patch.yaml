# Strategic-merge patch for the stepflow-o11y Grafana Deployment.
# Adds a volume + volumeMount so Grafana picks up the rcs-etcd
# dashboards from the new ConfigMap. Apply via:
#   kubectl patch deployment grafana -n stepflow-o11y \
#     --patch-file=k8s/o11y-patches/grafana-deployment-patch.yaml

spec:
  template:
    spec:
      containers:
        - name: grafana
          volumeMounts:
            - name: dashboard-rcs-etcd
              mountPath: /etc/grafana/provisioning/dashboards/rcs-etcd
              readOnly: true
      volumes:
        - name: dashboard-rcs-etcd
          configMap:
            name: grafana-dashboard-rcs-etcd
