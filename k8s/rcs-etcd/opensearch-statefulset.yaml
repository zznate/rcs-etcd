# 3-node OpenSearch StatefulSet running the testbed image with security
# disabled (POC convenience). Same image + same telemetry env in both
# configurations; only the mounted opensearch.yml ConfigMap differs.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: rcs-etcd-poc
  labels:
    app: opensearch
spec:
  serviceName: opensearch-headless
  replicas: 3
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: rcs-etcd-k8s:latest
          imagePullPolicy: Never
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m -Dopensearch.experimental.feature.telemetry.enabled=true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
          ports:
            - name: rest
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              memory: 768Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: data
              mountPath: /usr/share/opensearch/data
        - name: otel-sidecar
          image: otel/opentelemetry-collector-contrib:0.95.0
          imagePullPolicy: IfNotPresent
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: otel-sidecar-config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: opensearch-config
            items:
              - key: opensearch.yml
                path: opensearch.yml
        - name: otel-sidecar-config
          configMap:
            name: otel-sidecar-config
            items:
              - key: config.yaml
                path: config.yaml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
