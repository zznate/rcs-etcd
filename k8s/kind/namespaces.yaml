# Namespaces for the rcs-etcd k8s testbed.
# `otel-stack` hosts the self-contained observability stack vendored
# under k8s/otel-stack/. It is optional infrastructure; deploying it
# is a separate `make otel-stack` step.

apiVersion: v1
kind: Namespace
metadata:
  name: rcs-etcd-poc
  labels:
    name: rcs-etcd-poc
---
apiVersion: v1
kind: Namespace
metadata:
  name: otel-stack
  labels:
    name: otel-stack
