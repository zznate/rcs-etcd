apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: otel-stack
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: 'Infrastructure'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/infrastructure

      - name: 'rcs-etcd'
        orgId: 1
        folder: 'rcs-etcd'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/rcs-etcd
