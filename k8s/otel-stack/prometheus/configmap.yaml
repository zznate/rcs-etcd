apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: otel-stack
data:
  prometheus.yml: |
    # Prometheus scrape configuration. Two metric sources:
    #   - direct scrape of component /metrics endpoints (this file)
    #   - OTLP-pushed via the OTel Collector's Prometheus exporter at :8889

    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        environment: 'development'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              component: 'prometheus'

      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8888']
            labels:
              component: 'otel-collector'

      # OTLP-sourced metrics (workload-emitted) re-exposed by the collector.
      - job_name: 'otel-collector-exporter'
        static_configs:
          - targets: ['otel-collector:8889']
            labels:
              source: 'otlp'

      - job_name: 'jaeger'
        static_configs:
          - targets: ['jaeger:14269']
            labels:
              component: 'jaeger'

      - job_name: 'loki'
        static_configs:
          - targets: ['loki:3100']
            labels:
              component: 'loki'

      - job_name: 'grafana'
        static_configs:
          - targets: ['grafana:3000']
            labels:
              component: 'grafana'
