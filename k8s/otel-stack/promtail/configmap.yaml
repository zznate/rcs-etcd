apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: otel-stack
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Scrape logs from pods labelled `logs=collect`. Workloads opt in
      # by setting the label; namespaces are not enumerated so adding a
      # new application doesn't require touching this config.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
          - regex:
              expression: '.*trace_id=(?P<trace_id>\S+).*span_id=(?P<span_id>\S+).*'
          - regex:
              expression: '.*(INFO|DEBUG|WARN|ERROR|TRACE).*'
              source: log
          - labels:
              trace_id:
              span_id:
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_logs]
            action: keep
            regex: collect
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
