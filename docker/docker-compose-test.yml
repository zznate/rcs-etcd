services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: rcs-etcd-test-etcd
    command:
      - etcd
      - --name=rcs-test
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://localhost:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 2s
      retries: 10
