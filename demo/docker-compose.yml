services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: rcs-etcd-demo-etcd
    command:
      - etcd
      - --name=demo
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 2s
      retries: 10

  opensearch:
    image: rcs-etcd-demo:latest
    container_name: rcs-etcd-demo-opensearch
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      - cluster.name=rcs-etcd-demo
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true

      # Enable Remote Cluster State (RCS)
      - cluster.remote_store.state.enabled=true

      # rcs-etcd plugin settings: where the etcd ensemble lives and the
      # root prefix every key is namespaced under.
      - cluster.rcs_etcd.endpoints=http://etcd:2379
      - cluster.rcs_etcd.root_prefix=/opensearch-rcs

      # Tell RCS to use the etcd-rcs system repository for cluster state
      # and routing table publication.
      - node.attr.remote_store.state.repository=etcd-rcs
      - node.attr.remote_store.routing_table.repository=etcd-rcs

      # Bootstrap the system repository at node startup. The plugin's
      # actual configuration is read from the cluster.rcs_etcd.* settings
      # above; the per-repo settings.location attribute is required by
      # RemoteStoreNodeAttribute but ignored by EtcdRepository.
      - node.attr.remote_store.repository.etcd-rcs.type=etcd
      - node.attr.remote_store.repository.etcd-rcs.settings.location=/
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
